  TF_VAR_GOOGLE_CREDENTIALS: ${{ secrets.TF_VAR_GOOGLE_CREDENTIALS }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
  TF_CLOUD_WORKSPACE_INFRA: ${{ secrets.TF_CLOUD_WORKSPACE_INFRA }}

