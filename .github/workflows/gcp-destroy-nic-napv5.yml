name: "Destroy GCP Automation"
on:
  push:
    branches: gcp-destroy-nic-napv5
env:
  TF_VAR_GCP_BUCKET_NAME: ${{ secrets.TF_VAR_GCP_BUCKET_NAME }}
  TF_VAR_GCP_REGION: ${{ secrets.TF_VAR_GCP_REGION }}
  TF_VAR_GCP_PROJECT_ID: ${{ secrets.TF_VAR_GCP_PROJECT_ID }}
  TF_VAR_GOOGLE_CREDENTIALS: ${{ secrets.TF_VAR_GOOGLE_CREDENTIALS }}

jobs:
  terraform_gcs:
    name: "Destroy GCP Bucket"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gcp-test/bucket  # Set the working directory where your Terraform files are located
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Google Cloud Credentials
        uses: google-github-actions/setup-gcloud@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -no-color -input=false -out=tfplan

      - name: Check for Changes
        id: check_changes
        run: |
          if grep -q "No changes." <(terraform show -no-color tfplan); then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Destroy
        if: github.event_name == 'push' && github.ref == 'refs/heads/gcp-destroy-nic-napv5' && steps.check_changes.outputs.has_changes == 'true'
        run: terraform apply -auto-approve tfplan

  terraform:
    name: "Destroy GCP Bucket"
    runs-on: ubuntu-latest
    needs: terraform_gcs
    defaults:
      run:
        working-directory: ./gcp-test/infra  # Set the working directory where your Terraform files are located
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Google Cloud Credentials
        uses: google-github-actions/setup-gcloud@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform init

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -no-color -input=false -out=tfplan

      - name: Check for Changes
        id: check_changes
        run: |
          if grep -q "No changes." <(terraform show -no-color tfplan); then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Destroy
        if: github.event_name == 'push' && github.ref == 'refs/heads/gcp-destroy-nic-napv5' && steps.check_changes.outputs.has_changes == 'true'
        run: terraform apply -auto-approve tfplan

